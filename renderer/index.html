<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RevFlow · Slack Mock Previews</title>
  <link rel="stylesheet" href="renderer.css">
</head>
<body>
  <aside class="sidebar">
    <header class="sidebar-header">
      <div class="logo">
        <span class="logo-mark" aria-hidden="true">R</span>
        <div>
          <h1>Slack · Revenue Management</h1>
          <p>Block Kit mocks &amp; AI chat scenarios</p>
        </div>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="theme-toggle-dot"></span>
      </button>
    </header>

    <nav id="mock-nav" aria-label="Mocks"></nav>

  </aside>

  <main class="stage">
    <div class="stage-bar">
      <div>
        <span id="stage-title" class="stage-title">—</span>
        <span id="stage-surface" class="stage-surface">—</span>
      </div>
      <div id="stage-actions" class="stage-actions">
        <a id="open-in-bkb" class="btn btn-ghost" target="_blank" rel="noopener">Open in Block Kit Builder ↗</a>
        <a id="view-json" class="btn btn-ghost" target="_blank" rel="noopener">View raw JSON ↗</a>
      </div>
      <div id="chat-demo-actions" class="stage-actions" hidden>
        <button id="chat-demo-exit-top" class="btn" type="button">Exit demo</button>
      </div>
      <div id="flow-actions" class="stage-actions" hidden>
        <button id="flow-prev" class="btn btn-ghost" type="button">◀ Prev</button>
        <button id="flow-next" class="btn btn-ghost" type="button">Next ▶</button>
        <button id="flow-restart" class="btn btn-ghost" type="button">↻ Restart</button>
        <button id="flow-exit" class="btn" type="button">Exit demo</button>
      </div>
    </div>
    <p id="stage-description" class="stage-description"></p>

    <div id="flow-bar" class="flow-bar" hidden>
      <div class="flow-stepper" id="flow-stepper"></div>
      <div class="flow-hint" id="flow-hint">
        <span class="flow-hint-dot"></span>
        <span class="flow-hint-text">Click any button inside the mock to advance. Non-navigating actions fire a toast below.</span>
      </div>
    </div>

    <div id="viewport" class="viewport"></div>

    <div id="chat-demo-bar" class="chat-demo-bar" hidden>
      <div class="chat-demo-progress">
        <span id="chat-demo-counter" class="chat-demo-counter">Turn 1 of 1</span>
        <div class="chat-demo-progress-track"><div id="chat-demo-progress-fill" class="chat-demo-progress-fill"></div></div>
      </div>
      <div class="chat-demo-actions">
        <button id="chat-demo-restart" class="btn btn-ghost" type="button">↻ Restart</button>
        <button id="chat-demo-exit" class="btn btn-ghost" type="button">Exit demo</button>
        <button id="chat-demo-next" class="btn btn-primary" type="button">Next message ▶</button>
      </div>
    </div>
  </main>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <div id="overflow-popover" class="overflow-popover" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
