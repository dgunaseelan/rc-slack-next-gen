<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280" role="img" aria-label="Quote breakdown: Subtotal $48,200, Discount -$5,784, Tax $3,545, Total $45,961">
  <rect width="500" height="280" fill="#1a1d21"/>
