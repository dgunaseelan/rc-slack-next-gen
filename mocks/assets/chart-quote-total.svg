    <text text-anchor="middle" y="-4" fill="#ffffff" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="700">12%</text>
    <text text-anchor="middle" y="15" fill="#868686" font-family="-apple-system, system-ui, sans-serif" font-size="10">discount</text>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="12">
    <rect x="280" y="100" width="12" height="12" fill="#36c5f0" rx="2"/>
