  <text x="24" y="58" fill="#ffffff" font-family="-apple-system, system-ui, sans-serif" font-size="24" font-weight="700">$45,961.00</text>
  <text x="170" y="58" fill="#868686" font-family="-apple-system, system-ui, sans-serif" font-size="12">Total after discount &amp; tax</text>

  <g transform="translate(140, 155)">
